<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi Digital</title>
    <style>
        :root {
            --primary: #118EEA;    /* Biru DANA */
            --primary-dark: #0077C8;
            --light-bg: #E7F5FF;
            --white: #ffffff;
            --text-dark: #333333;
            --text-gray: #666666;
            --accent-red: #FF4F21; /* Merah Pita */
        }
        body {
            font-family: 'Inter', sans-serif; text-align: center; 
            background-color: var(--light-bg); color: var(--text-dark); margin: 0; padding: 20px;
            user-select: none; touch-action: manipulation;
        }
        .container { 
            max-width: 400px; margin: 60px auto; background: var(--white); 
            padding: 40px 30px; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(17, 142, 234, 0.15); 
            border: 1px solid rgba(17, 142, 234, 0.1); 
            position: relative; overflow: hidden;
        }
        
        h2 { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: 0.5px; }
        #hint { color: var(--text-gray); font-size: 13px; margin-top: 12px; }

        /* --- Animasi Amplop --- */
        .gift-wrapper { 
            position: relative; width: 180px; height: 180px; margin: 25px auto; 
            perspective: 1000px;
        }

        /* Ikon Amplop DANA (Ikon utama sebelum diklik) */
        #gift-icon { 
            width: 100%; height: auto; cursor: pointer; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; position: relative;
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* Visual Amplop Terbuka */
        .envelope-box {
            position: absolute; width: 100%; height: 100%;
            background: #fdfdfe; border: 2px solid #e1effa; border-radius: 15px;
            top: 0; left: 0; z-index: 5; opacity: 0; transform: scale(0.8) translateY(30px);
            transition: all 0.6s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .envelope-flap {
            position: absolute; width: 100%; height: 50%;
            background: #f4faff; border: 2px solid #e1effa;
            top: 0; left: -2px; border-radius: 15px 15px 0 0;
            transform-origin: top; transition: transform 0.5s 0.4s ease-in;
            z-index: 6; width: calc(100% + 4px);
        }

        /* State Terbuka */
        .gift-wrapper.opened #gift-icon { transform: scale(0) rotate(-15deg); opacity: 0; pointer-events: none; }
        .gift-wrapper.opened .envelope-box { opacity: 1; transform: scale(1) translateY(0); }
        .gift-wrapper.opened .envelope-flap { transform: rotateX(-160deg); }

        /* --- Tampilan Saldo --- */
        #reward-box {
            display: none; opacity: 0; transition: opacity 0.6s 0.8s;
            padding: 25px 15px; position: relative; z-index: 7;
        }
        #reward-box.show { display: block; opacity: 1; }
        
        .amount-card {
            background: #fff; border-radius: 12px; padding: 15px;
            border: 1.5px dashed var(--primary); margin: 10px 0;
        }
        .amount { font-size: 30px; font-weight: 900; color: var(--accent-red); display: block; }

        /* --- Tombol --- */
        .btn-claim { 
            padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer;
            background: var(--primary); color: var(--white); border: none; 
            border-radius: 12px; width: 100%; margin-top: 15px; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(17, 142, 234, 0.3);
            text-transform: uppercase;
        }
        .btn-claim:active { transform: scale(0.98); }
        .btn-claim:disabled { background: #ccd6dd; box-shadow: none; cursor: not-allowed; }

        #success-msg { margin-top: 15px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>VERIFIKASI SISTEM</h2>
        <p id="hint">Ketuk amplop untuk klaim Saldo DANA Kaget</p>
        
        <div class="gift-wrapper" id="area-icon">
            <img id="gift-icon" class="pulse" src="https://i.ibb.co/v4mS8S6/dana-kaget-envelope.png" onclick="openGift()" alt="DANA Kaget">
            
            <div class="envelope-box">
                <div class="envelope-flap"></div>
                <div id="reward-box">
                    <span style="font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--text-gray);">Selamat! Kamu Mendapat</span>
                    <div class="amount-card">
                        <span class="amount" id="final-amount">Rp 0</span>
                    </div>
                    <p style="font-size: 10px; color: var(--primary); font-weight: bold;">SINKRONISASI BERHASIL</p>
                </div>
            </div>
        </div>

        <button id="mainBtn" class="btn-claim" onclick="openGift()">BUKA SEKARANG</button>
        
        <div id="success-msg" style="display:none;">
            <p style="color: var(--primary); font-weight: 800; font-size: 14px; margin-bottom: 5px;">✓ BERHASIL DISINKRONKAN</p>
            <p style="font-size: 11px; color: var(--text-gray); line-height: 1.4;">Saldo akan otomatis masuk ke akun terdaftar setelah proses validasi sistem selesai.</p>
        </div>
    </div>

    <script>
        const prizes = ["Rp 350.000", "Rp 500.000", "Rp 750.000"];

        window.onload = function() {
            const savedPrize = localStorage.getItem("user_reward");
            if (savedPrize) {
                showLockedResult(savedPrize);
            }
        };

        function openGift() {
            if (localStorage.getItem("user_reward")) return;

            const wrapper = document.getElementById('area-icon');
            const btn = document.getElementById('mainBtn');
            const hint = document.getElementById('hint');
            
            // Trigger Animasi
            wrapper.classList.add('opened');
            btn.innerText = "PROSES VERIFIKASI...";
            btn.disabled = true;
            hint.style.visibility = "hidden";

            setTimeout(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                localStorage.setItem("user_reward", randomPrize);
                showLockedResult(randomPrize);
            }, 1500); 
        }

        function showLockedResult(prizeValue) {
            const wrapper = document.getElementById('area-icon');
            const rewardBox = document.getElementById('reward-box');
            const amountTxt = document.getElementById('final-amount');
            const btn = document.getElementById('mainBtn');
            const hint = document.getElementById('hint');
            const success = document.getElementById('success-msg');

            amountTxt.innerText = prizeValue;
            wrapper.classList.add('opened');
            
            btn.style.display = "none";
            hint.style.display = "none";
            rewardBox.classList.add('show');
            success.style.display = "block";
        }
    </script>
</body>
</html>
