<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi Digital</title>
    <style>
        :root {
            --primary: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif; text-align: center; 
            background-color: var(--dark-bg); color: white; margin: 0; padding: 20px;
            user-select: none; touch-action: manipulation;
        }
        .container { 
            max-width: 400px; margin: 60px auto; background: var(--card-bg); 
            padding: 40px 30px; border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); border: 1px solid #334155; 
        }
        
        /* Ikon Animasi */
        .gift-wrapper { position: relative; width: 160px; height: 160px; margin: 30px auto; }
        #gift-icon { 
            width: 100%; height: 100%; cursor: pointer; transition: 0.5s;
            filter: drop-shadow(0 10px 15px rgba(16, 185, 129, 0.3));
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Tampilan Saldo */
        #reward-box {
            display: none; opacity: 0; transform: scale(0.5); transition: 0.6s;
            background: white; color: var(--dark-bg); padding: 25px; 
            border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            margin: 20px 0;
        }
        #reward-box.show { display: block; opacity: 1; transform: scale(1); }
        .amount { font-size: 32px; font-weight: 900; color: var(--primary); display: block; margin: 10px 0; }

        .btn-claim { 
            padding: 18px; font-size: 16px; font-weight: 800; cursor: pointer;
            background: var(--primary); color: white; border: none; border-radius: 15px; 
            width: 100%; margin-top: 20px; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary); margin: 0; letter-spacing: 1px;">VERIFIKASI SISTEM</h2>
        <p id="hint" style="font-size: 14px; color: #94a3b8; margin-top: 15px;">Ketuk ikon untuk sinkronisasi akun</p>
        
        <div class="gift-wrapper" id="area-icon">
            <img id="gift-icon" class="pulse" src="https://cdn-icons-png.flaticon.com/512/10142/10142646.png" onclick="openGift()">
        </div>

        <div id="reward-box">
            <span style="font-weight: 700; font-size: 14px; text-transform: uppercase; color: #64748b;">Saldo Terverifikasi</span>
            <span class="amount" id="final-amount">Rp 0</span>
            <p style="font-size: 11px; margin: 0; color: #94a3b8;">Status: Berhasil Disinkronkan</p>
        </div>

        <button id="mainBtn" class="btn-claim" onclick="openGift()">CEK STATUS SEKARANG</button>
        
        <div id="success-msg" style="display:none; margin-top: 20px;">
            <p style="color: var(--primary); font-weight: bold; margin-bottom: 5px;">✓ Proses Selesai</p>
            <p style="font-size: 11px; color: #94a3b8;">Data Anda telah terkunci di server. Saldo akan diproses ke akun terdaftar.</p>
        </div>
    </div>

    <script>
        const prizes = ["Rp 350.000", "Rp 500.000", "Rp 750.000"];

        // Fungsi saat pertama kali halaman dimuat
        window.onload = function() {
            const savedPrize = localStorage.getItem("user_reward");
            if (savedPrize) {
                // Jika sudah ada data tersimpan, langsung tampilkan hasil (Lock)
                showLockedResult(savedPrize);
            }
        };

        function openGift() {
            // Cek lagi apakah sudah pernah dapet (untuk keamanan ganda)
            if (localStorage.getItem("user_reward")) return;

            const icon = document.getElementById('gift-icon');
            const btn = document.getElementById('mainBtn');
            
            icon.classList.remove('pulse');
            icon.style.transform = "scale(0.8)";
            btn.innerText = "MENYINKRONKAN...";
            btn.disabled = true;

            setTimeout(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                
                // SIMPAN KE MEMORI BROWSER
                localStorage.setItem("user_reward", randomPrize);
                
                showLockedResult(randomPrize);
            }, 1200);
        }

        function showLockedResult(prizeValue) {
            const iconArea = document.getElementById('area-icon');
            const rewardBox = document.getElementById('reward-box');
            const amountTxt = document.getElementById('final-amount');
            const btn = document.getElementById('mainBtn');
            const hint = document.getElementById('hint');
            const success = document.getElementById('success-msg');

            // Set nominal hadiah
            amountTxt.innerText = prizeValue;

            // Sembunyikan elemen awal
            iconArea.style.display = "none";
            btn.style.display = "none";
            hint.style.display = "none";

            // Tampilkan hasil yang terkunci
            rewardBox.classList.add('show');
            rewardBox.style.display = "block";
            rewardBox.style.opacity = "1";
            rewardBox.style.transform = "scale(1)";
            success.style.display = "block";
        }
    </script>
</body>
</html>
