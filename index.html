<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Aktivasi Layanan Digital</title>
    <style>
        :root {
            --primary: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --dana-blue: #0085ff;
        }
        body {
            font-family: 'Inter', sans-serif; text-align: center; 
            background-color: var(--dark-bg); color: white; margin: 0; padding: 20px;
            user-select: none; touch-action: manipulation;
        }
        .container { max-width: 400px; margin: 40px auto; background: var(--card-bg); padding: 35px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        /* Animation Section */
        .wallet-wrapper { position: relative; width: 150px; height: 150px; margin: 30px auto; }
        #main-icon { width: 100%; height: 100%; cursor: pointer; transition: 0.4s; z-index: 10; position: relative; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #sync-value {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 28px; font-weight: 800; color: var(--primary); background: white; 
            padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 20; transition: 0.6s;
        }
        #sync-value.show { transform: translate(-50%, -50%) scale(1); }

        .btn-main { 
            padding: 18px; font-size: 16px; font-weight: 800; cursor: pointer;
            background: var(--primary); color: white; border: none; border-radius: 15px; width: 100%; margin-top: 20px;
        }

        /* Loading Area */
        #loadingArea { display: none; margin: 30px 0; }
        .progress-container { width: 100%; background: #020617; border-radius: 20px; height: 12px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }

        /* Modal Result */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(12px); }
        .modal-content { background: white; color: #1e293b; margin: 15% auto; padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; }
        
        .dana-card { background: linear-gradient(135deg, #0085ff 0%, #005bc4 100%); color: white; border-radius: 20px; padding: 22px; margin: 20px 0; text-align: left; }
        .copy-box { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); margin-top: 8px; }
        .btn-copy { background: white; color: var(--dana-blue); border: none; padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 900; cursor: pointer; }
        
        .btn-finish { display: block; padding: 16px; background: #22c55e; color: white; border-radius: 15px; text-decoration: none; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary); margin: 0;">VERIFIKASI SISTEM</h2>
        <p id="top-msg" style="font-size: 14px; color: #94a3b8; margin-top: 10px;">Ketuk ikon untuk sinkronisasi otomatis</p>
        
        <div class="wallet-wrapper" id="boxArea">
            <img id="main-icon" class="pulse" src="https://cdn-icons-png.flaticon.com/512/10142/10142646.png" alt="Icon" onclick="startAction()">
            <div id="sync-value"></div>
        </div>

        <button id="startBtn" class="btn-main" onclick="startAction()">SINKRONKAN SEKARANG</button>

        <div id="loadingArea">
