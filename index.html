<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi Digital - DANA Kaget Style</title>
    <style>
        :root {
            --primary: #118EEA;
            --primary-dark: #0077C8; 
            --light-bg: #E7F5FF;  
            --white: #ffffff;
            --text-dark: #333333;
            --text-gray: #666666;
            --reward-color: #FF4F21; 
            --dana-orange: #F27320;
        }
        body {
            font-family: 'Inter', sans-serif; text-align: center; 
            background-color: var(--light-bg); color: var(--text-dark); margin: 0; padding: 20px;
            user-select: none; touch-action: manipulation;
        }
        .container { 
            max-width: 400px; margin: 40px auto; background: var(--white); 
            padding: 30px 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(17, 142, 234, 0.2); 
            border: 1px solid rgba(17, 142, 234, 0.1); 
            position: relative; overflow: hidden;
        }
        
        h2 { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: 0.5px; }
        #hint { color: var(--text-gray); font-size: 13px; margin-top: 10px; }

        .gift-wrapper { 
            position: relative; width: 220px; height: 220px; margin: 20px auto; 
            perspective: 1000px;
        }

        #gift-icon { 
            width: 100%; height: auto; cursor: pointer; transition: transform 0.6s ease-out;
            filter: drop-shadow(0 8px 12px rgba(17, 142, 234, 0.3)); 
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- Tampilan Hasil Akhir (Gaya image_264f45.jpg) --- */
        .result-envelope {
            position: absolute; width: 100%; height: 100%;
            background: var(--white); border-radius: 15px;
            top: 0; left: 0; z-index: 5; opacity: 0; transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #f0f0f0;
        }

        .gift-wrapper.opened #gift-icon { transform: scale(0); opacity: 0; }
        .gift-wrapper.opened .result-envelope { opacity: 1; transform: scale(1); }

        .top-header {
            width: 100%; background: var(--primary); padding: 15px 0;
            border-radius: 12px 12px 0 0; position: absolute; top: 0;
        }
        .top-header span { color: white; font-weight: 800; font-size: 14px; text-transform: uppercase; }

        #reward-content {
            margin-top: 40px; padding: 20px; width: 90%;
        }

        .amount-display {
            font-size: 34px; font-weight: 900; color: var(--dana-orange);
            margin: 10px 0; display: block;
        }

        .congrats-text { font-size: 14px; font-weight: 700; color: var(--text-dark); }
        
        .status-badge {
            background: #E8F5E9; color: #2E7D32; padding: 5px 15px;
            border-radius: 20px; font-size: 11px; font-weight: 800;
            display: inline-block; margin-top: 10px;
        }

        /* Dekorasi Koin (Opsional) */
        .coin-decor {
            position: absolute; width: 40px; opacity: 0.6; z-index: 4;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn-claim { 
            padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer;
            background: var(--primary); color: var(--white); border: none; 
            border-radius: 12px; width: 100%; margin-top: 10px; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(17, 142, 234, 0.3);
            text-transform: uppercase;
        }
        .btn-claim:disabled { background: #ccc; box-shadow: none; }

        #success-msg { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 10px; }

    /* ... kode lainnya tetap sama ... */

    .gift-wrapper { 
        position: relative; 
        width: 100%; 
        max-width: 200px; /* Ukuran lebar maksimal amplop */
        height: 280px;    /* Sesuaikan tinggi agar amplop tidak terpotong */
        margin: 10px auto; 
        perspective: 1000px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #gift-icon { 
        width: 100%; 
        height: 100%; 
        object-fit: contain; /* Memastikan gambar amplop terlihat utuh */
        cursor: pointer; 
        transition: transform 0.6s ease-out;
        filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.1)); 
        position: absolute; 
        z-index: 10;
    }

    /* Memperbaiki ukuran kotak hasil agar pas dengan area amplop */
    .result-envelope {
        position: absolute; 
        width: 100%; 
        height: 100%; /* Mengikuti tinggi wrapper */
        background: var(--white); 
        border-radius: 15px;
        z-index: 5; 
        opacity: 0; 
        transform: scale(0.5);
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center;
        border: 2px solid #f0f0f0;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* Efek saat terbuka */
    .gift-wrapper.opened #gift-icon { 
        transform: scale(0) translateY(-50px); 
        opacity: 0; 
    }
    
    /* ... kode lainnya tetap sama ... */
    
    </style>
</head>
<body>

    <div class="container">
        <h2>DANA KAGET </h2>
        <p id="hint">Ketuk amplop untuk melihat kejutanmu!</p>
        
        <div class="gift-wrapper" id="area-icon">
            <img id="gift-icon" class="pulse" src="https://a.m.dana.id/resource/dana-transfer/luckymoney/general/envelope-closed.png" onclick="openGift()" alt="DANA Kaget">
            
            <div class="result-envelope" id="result-box">
                <div class="top-header">
                    <span>Dana Kaget Terbuka!</span>
                </div>
                <div id="reward-content">
                    <p class="congrats-text">Selamat! Anda mendapatkan</p>
                    <span class="amount-display" id="final-amount">Rp 0</span>
                    <div class="status-badge"></div>
                </div>
            </div>
        </div>

        <button id="mainBtn" class="btn-claim" onclick="openGift()">BUKA SEKARANG</button>
        
        <div id="success-msg" style="display:none;">
            <p style="color: var(--primary); font-weight: 800; font-size: 14px; margin: 0 0 5px 0;">SCREENSHOT BUKTI INI</p>
            <p style="font-size: 11px; color: var(--text-gray); line-height: 1.4;">BERIKAN BUKTI INI PADA ADMIN UNTUK DI PROSES.</p>
        </div>
    </div>

    <script>
        const prizes = ["Rp 1000.000", "Rp 150.000", "Rp 200.000"];

        window.onload = function() {
            const savedPrize = localStorage.getItem("user_reward");
            if (savedPrize) {
                showLockedResult(savedPrize);
            }
        };

        function openGift() {
            if (localStorage.getItem("user_reward")) return;

            const wrapper = document.getElementById('area-icon');
            const btn = document.getElementById('mainBtn');
            const hint = document.getElementById('hint');
            
            wrapper.classList.add('opened');
            btn.innerText = "SEDANG MEMPROSES...";
            btn.disabled = true;
            hint.style.visibility = "hidden";

            setTimeout(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                localStorage.setItem("user_reward", randomPrize);
                showLockedResult(randomPrize);
            }, 1200); 
        }

        function showLockedResult(prizeValue) {
            const wrapper = document.getElementById('area-icon');
            const amountTxt = document.getElementById('final-amount');
            const btn = document.getElementById('mainBtn');
            const hint = document.getElementById('hint');
            const success = document.getElementById('success-msg');

            amountTxt.innerText = prizeValue;
            wrapper.classList.add('opened');
            
            btn.style.display = "none";
            hint.style.display = "none";
            success.style.display = "block";
        }
    </script>
</body>
</html>
