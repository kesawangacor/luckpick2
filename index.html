<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi Digital</title>
    <style>
        :root {
            --primary: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif; text-align: center; 
            background-color: var(--dark-bg); color: white; margin: 0; padding: 20px;
            user-select: none; touch-action: manipulation;
        }
        .container { 
            max-width: 400px; margin: 60px auto; background: var(--card-bg); 
            padding: 40px 30px; border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); border: 1px solid #334155; 
        }
        
        /* Ikon Animasi */
        .gift-wrapper { position: relative; width: 160px; height: 160px; margin: 30px auto; }
        #gift-icon { 
            width: 100%; height: 100%; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: drop-shadow(0 10px 15px rgba(16, 185, 129, 0.3));
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Tampilan Saldo */
        #reward-box {
            display: none; opacity: 0; transform: scale(0.5); transition: 0.6s;
            background: white; color: var(--dark-bg); padding: 25px; 
            border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            margin: 20px 0;
        }
        #reward-box.show { display: block; opacity: 1; transform: scale(1); }
        .amount { font-size: 32px; font-weight: 900; color: var(--primary); display: block; margin: 10px 0; }

        .btn-claim { 
            padding: 18px; font-size: 16px; font-weight: 800; cursor: pointer;
            background: var(--primary); color: white; border: none; border-radius: 15px; 
            width: 100%; margin-top: 20px; transition: 0.3s;
        }
        .btn-claim:active { transform: scale(0.95); }

        /* Status Text */
        .status-msg { font-size: 14px; color: #94a3b8; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary); margin: 0; letter-spacing: 1px;">VERIFIKASI AKUN</h2>
        <p class="status-msg" id="hint">Ketuk kotak di bawah untuk melihat status sinkronisasi akun Anda</p>
        
        <div class="gift-wrapper">
            <img id="gift-icon" class="pulse" src="https://cdn-icons-png.flaticon.com/512/10142/10142646.png" alt="Icon" onclick="openGift()">
        </div>

        <div id="reward-box">
            <span style="font-weight: 700; font-size: 14px; text-transform: uppercase; color: #64748b;">Saldo Terdeteksi</span>
            <span class="amount" id="final-amount">Rp 0</span>
            <p style="font-size: 12px; margin: 0; color: #94a3b8;">ID: 4492-XXXX-8821</p>
        </div>

        <button id="mainBtn" class="btn-claim" onclick="openGift()">CEK SEKARANG</button>
        
        <div id="success-msg" style="display:none; margin-top: 20px;">
            <p style="color: var(--primary); font-weight: bold; margin-bottom: 5px;">✓ Sinkronisasi Berhasil</p>
            <p style="font-size: 11px; color: #94a3b8;">Saldo akan otomatis masuk ke akun terdaftar dalam 1x24 jam.</p>
        </div>
    </div>

    <script>
        const prizes = ["Rp 350.000", "Rp 500.000", "Rp 750.000"];

        function openGift() {
            const icon = document.getElementById('gift-icon');
            const btn = document.getElementById('mainBtn');
            const rewardBox = document.getElementById('reward-box');
            const amountTxt = document.getElementById('final-amount');
            const hint = document.getElementById('hint');

            // 1. Efek Klik
            icon.classList.remove('pulse');
            icon.style.transform = "scale(0.8) rotate(-10deg)";
            btn.innerText = "MEMPROSES...";
            btn.disabled = true;

            setTimeout(() => {
                // 2. Hilangkan Ikon
                icon.style.opacity = "0";
                icon.style.transform = "scale(0) rotate(20deg)";
                
                // 3. Tampilkan Hasil
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                amountTxt.innerText = randomPrize;
                
                setTimeout(() => {
                    icon.style.display = "none";
                    rewardBox.classList.add('show');
                    btn.style.display = "none";
                    hint.style.display = "none";
                    document.getElementById('success-msg').style.display = "block";
                }, 400);

            }, 1000);
        }
    </script>
</body>
</html>
